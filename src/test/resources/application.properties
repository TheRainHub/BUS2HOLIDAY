spring.flyway.enabled=false

# create-drop: creates schema on first context load, drops on JVM exit.
# All test classes extend TestContainerConfig which shares ONE static container.
# Using create-drop means the schema is created once and cleaned up.
spring.jpa.hibernate.ddl-auto=create-drop

# Disable data.sql in tests — each test creates its own data
spring.sql.init.mode=never

# Suppress open-in-view warning in tests
spring.jpa.open-in-view=false

